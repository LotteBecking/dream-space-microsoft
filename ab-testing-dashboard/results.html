<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A/B Results Screen</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-rose-50 via-pink-100 to-violet-100 p-4 text-slate-900 sm:p-6">
  <main class="mx-auto max-w-4xl rounded-3xl border border-white/80 bg-white/80 p-5 shadow-xl backdrop-blur-sm sm:p-8">
    <div class="mb-4 flex flex-wrap gap-2">
      <a
        class="rounded-xl border border-fuchsia-200 bg-fuchsia-50 px-3 py-2 text-sm font-semibold text-fuchsia-700 transition hover:bg-fuchsia-100"
        href="/"
      >Back To Voting</a>
    </div>

    <h1 class="text-3xl font-bold tracking-tight text-violet-900 sm:text-4xl">A/B Testing Results</h1>
    <p class="mt-2 text-sm text-slate-600 sm:text-base">Live vote totals from the SQLite database.</p>

    <section class="mt-6 overflow-hidden rounded-2xl border border-fuchsia-100 bg-white shadow-sm" aria-live="polite">
      <div class="flex items-center justify-between border-b border-slate-100 px-4 py-3 text-[15px] sm:text-base"><span>Design A</span><strong id="countA">0</strong></div>
      <div class="flex items-center justify-between border-b border-slate-100 px-4 py-3 text-[15px] sm:text-base"><span>Design B</span><strong id="countB">0</strong></div>
      <div class="flex items-center justify-between border-b border-slate-100 px-4 py-3 text-[15px] sm:text-base"><span>Design C</span><strong id="countC">0</strong></div>
      <div class="flex items-center justify-between border-b border-slate-100 px-4 py-3 text-[15px] sm:text-base"><span>Last favorite</span><strong id="favorite">None</strong></div>
      <div class="flex items-center justify-between border-b border-slate-100 px-4 py-3 text-[15px] sm:text-base"><span>Most liked</span><strong class="font-semibold text-fuchsia-700" id="mostLiked">None yet</strong></div>
      <div class="flex items-center justify-between px-4 py-3 text-[15px] sm:text-base"><span>Total votes</span><strong id="totalVotes">0</strong></div>
    </section>

    <div class="mt-5 flex flex-wrap gap-2">
      <button
        id="refreshBtn"
        type="button"
        class="rounded-xl bg-violet-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-violet-800"
      >
        Refresh
      </button>
      <button
        id="resetBtn"
        type="button"
        class="rounded-xl border border-rose-200 bg-rose-50 px-4 py-2 text-sm font-semibold text-rose-700 transition hover:bg-rose-100"
      >
        Reset All Votes
      </button>
    </div>

    <div
      class="mt-3 flex min-h-11 items-center rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm text-slate-600"
      id="statusMsg"
    ></div>
  </main>

  <script>
    const countA = document.getElementById("countA");
    const countB = document.getElementById("countB");
    const countC = document.getElementById("countC");
    const favorite = document.getElementById("favorite");
    const mostLiked = document.getElementById("mostLiked");
    const totalVotes = document.getElementById("totalVotes");
    const statusMsg = document.getElementById("statusMsg");
    const refreshBtn = document.getElementById("refreshBtn");
    const resetBtn = document.getElementById("resetBtn");
    const neutralStatusClasses = [
      "border-slate-200",
      "bg-slate-50",
      "text-slate-600"
    ];
    const successStatusClasses = [
      "border-emerald-200",
      "bg-emerald-50",
      "text-emerald-700",
      "font-semibold"
    ];

    function setStatus(message, isSuccess = false) {
      statusMsg.textContent = message;
      statusMsg.classList.remove(...neutralStatusClasses, ...successStatusClasses);
      statusMsg.classList.add(...(isSuccess ? successStatusClasses : neutralStatusClasses));
    }

    function render(data) {
      countA.textContent = String(data.votes.A);
      countB.textContent = String(data.votes.B);
      countC.textContent = String(data.votes.C);
      favorite.textContent = data.favorite ? `Design ${data.favorite}` : "None";
      mostLiked.textContent = data.most_liked.length ? data.most_liked.join(", ") : "None yet";
      totalVotes.textContent = String(data.total_votes);
    }

    function loadResults() {
      fetch("/api/results")
        .then(async (response) => {
          if (!response.ok) {
            const payload = await response.json().catch(() => ({}));
            throw new Error(payload.error || "Could not load results");
          }
          return response.json();
        })
        .then((data) => {
          render(data);
          setStatus("Results updated.", true);
        })
        .catch((error) => {
          setStatus(error.message);
        });
    }

    refreshBtn.addEventListener("click", loadResults);

    resetBtn.addEventListener("click", () => {
      fetch("/api/reset", { method: "POST" })
        .then((response) => {
          if (!response.ok) throw new Error("Could not reset votes");
          setStatus("Votes reset.", true);
          loadResults();
        })
        .catch((error) => {
          setStatus(error.message);
        });
    });

    loadResults();
    setInterval(loadResults, 5000);
  </script>
</body>
</html>
