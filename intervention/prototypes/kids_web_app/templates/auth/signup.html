<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account · Dream Space</title>
  <script>
    (function(){
      var t=localStorage.getItem('ds-theme')||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');
      document.documentElement.setAttribute('data-theme',t);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card card" style="padding:0;overflow:hidden;">
    <div class="auth-header gradient-brand">
      <div style="font-size:2.5rem;margin-bottom:8px;">✨</div>
      <h1>Join Dream Space!</h1>
      <p>Start your coding adventure today</p>
    </div>
    <div class="auth-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="{{ url_for('auth.signup') }}">
        <div class="form-group">
          <label class="form-label" for="name">Choose a nickname</label>
          <input class="form-input" type="text" id="name" name="name"
                 placeholder="e.g. StarCoder99" required autocomplete="name">
          <p style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">🔒 Your nickname won't reveal who you are. Keep it fun!</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="At least 6 characters" required autocomplete="new-password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
          Create Account →
        </button>
      </form>

      <p class="text-center text-muted mt-16" style="font-size:0.85rem;">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" style="color:var(--purple);font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
