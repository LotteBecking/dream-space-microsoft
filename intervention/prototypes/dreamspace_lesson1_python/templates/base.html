<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}" />
  <title>{% block title %}DreamSpace -- Lesson 1{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fredoka: ['"Fredoka"', 'system-ui', 'sans-serif'],
            silkscreen: ['"Silkscreen"', 'monospace'],
          },
          colors: {
            cream: '#fffaf3',
            'ds-blue': '#4f91d7',
            'ds-blue-dark': '#2f6fae',
            ink: '#274565',
            muted: '#5d7390',
            line: '#b7d2ef',
            'ds-purple': '#9f8de6',
            'ds-green': '#37a951',
            locked: '#d6dce8',
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --color-cream: #fffaf3;
      --color-blue: #4f91d7;
      --color-blue-dark: #2f6fae;
      --color-ink: #274565;
      --color-muted: #5d7390;
      --color-line: #b7d2ef;
      --color-purple: #9f8de6;
      --color-green-dark: #37a951;
      --color-locked: #d6dce8;
      --font-fredoka: "Fredoka", system-ui, sans-serif;
      --font-silkscreen: "Silkscreen", monospace;
      --radius-card: 22px;
      --radius-pill: 999px;
      --radius-btn: 18px;
      --shadow-card: 0 4px 0 #91b3e359;
      --shadow-btn: 0 6px 0 #277db0f2;
      --shadow-chip: 0 4px 0 #4f91d729;
    }

    html, body {
      min-height: 100%;
      font-family: var(--font-fredoka);
      color: var(--color-ink);
      margin: 0;
    }
    body { background: var(--color-cream); }
    button { font: inherit; cursor: pointer; }
    img { max-width: 100%; display: block; }

    .ds-backdrop {
      pointer-events: none; z-index: -1;
      background: linear-gradient(#f3f9ff99, #f5e9ff7a 56%, #e8ecff99);
      position: fixed; inset: 0;
    }
    .ds-screen {
      max-width: 430px; min-height: 100vh;
      margin: 0 auto; padding: 18px 16px 108px;
      position: relative;
    }
    .ds-card {
      border: 3px solid var(--color-blue);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      color: #1f2937; background: #fffffff0; padding: 16px;
    }
    .ds-card-line {
      border: 3px solid var(--color-line);
      border-radius: var(--radius-card);
      background: #fffffff0; padding: 16px;
      box-shadow: 0 4px #bfc8dde6;
    }
    .ds-pixel-chip {
      border: 3px solid var(--color-blue);
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-chip);
      color: var(--color-blue-dark);
      letter-spacing: .13em; font-size: 12px;
      font-family: var(--font-silkscreen);
      background: #ffffffeb; padding: 8px 13px;
      display: inline-block;
    }
    .ds-btn-primary {
      border-radius: var(--radius-btn); color: #fff; width: 100%;
      box-shadow: var(--shadow-btn); font-size: 18px; font-weight: 700;
      font-family: var(--font-fredoka); cursor: pointer;
      background: linear-gradient(#3ca9f5, #217ae8);
      border: none; padding: 15px 16px; transition: opacity .15s;
      text-align: center; text-decoration: none; display: block;
    }
    .ds-btn-primary:disabled { opacity: .55; cursor: not-allowed; box-shadow: 0 3px #277db080; }
    .ds-btn-secondary {
      border: 2px solid var(--color-blue);
      border-radius: var(--radius-btn); color: var(--color-blue-dark);
      font-size: 15px; font-family: var(--font-fredoka);
      cursor: pointer; background: #ffffffeb; padding: 10px 16px;
      text-align: center; text-decoration: none; display: inline-block;
    }
    .ds-bubble {
      border: 3px solid var(--color-line); color: #2a3441;
      background: #fffffff0; border-radius: 20px;
      padding: 14px 16px; font-size: 18px; line-height: 1.3;
      position: relative; box-shadow: 0 3px #bfc8ddcc;
    }
    .ds-bubble::before {
      content: ""; border-left: 3px solid var(--color-line);
      border-bottom: 3px solid var(--color-line);
      background: #fffffff0; width: 16px; height: 16px;
      position: absolute; top: 18px; left: -9px; transform: rotate(45deg);
    }
    .ds-progress-track {
      border: 2px solid var(--color-blue);
      border-radius: var(--radius-pill);
      background: #dcecff; flex: 1; height: 18px; padding: 2px;
      box-shadow: inset 0 2px #4f91d726;
    }
    .ds-progress-fill {
      border-radius: var(--radius-pill);
      background: linear-gradient(#5fb6f2, #3894e1);
      height: 100%; transition: width .5s; display: block;
    }
    .ds-mascot-wrap {
      border: 3px solid var(--color-blue);
      background: #f3faffeb; border-radius: 26px;
      place-items: center; min-width: 94px; padding: 8px;
      display: grid; box-shadow: 0 4px #91b3e359;
    }
    .ds-mascot {
      object-fit: contain; width: 78px; height: 78px;
      image-rendering: pixelated; filter: drop-shadow(0 3px #365c841a);
    }
    .ds-footer-cta {
      backdrop-filter: blur(8px);
      border-top: 2px solid var(--color-blue);
      z-index: 20; background: #fffffff5;
      padding: 14px 16px; position: fixed;
      bottom: 56px; left: 0; right: 0;
    }
    .ds-footer-cta-inner { max-width: 430px; margin: 0 auto; }
    .ds-topbar { align-items: center; gap: 10px; margin-bottom: 22px; display: flex; }
    .ds-speech-row { align-items: flex-start; gap: 14px; margin-bottom: 24px; display: flex; }
    .ds-success-banner {
      color: #25633a; background: #ecfff0;
      border: 2px solid #76c48a; border-radius: 16px;
      margin-top: 12px; padding: 12px; font-weight: 600;
    }
    .ds-pill {
      color: #7a8799; background: #fff;
      border: 1px solid #c0c9df; border-radius: 999px;
      margin-bottom: 10px; padding: 5px 9px; font-size: 12px;
      display: inline-block;
    }
    .kitchen-item {
      color: var(--color-muted); flex-direction: column;
      align-items: center; gap: 4px; font-size: 11px; display: flex;
    }
    .kitchen-item .item-emoji { font-size: 36px; line-height: 1; }
    .kitchen-item .item-label { text-align: center; max-width: 60px; font-size: 10px; }
    .sort-card {
      border: 3px solid var(--color-line); cursor: grab;
      user-select: none; touch-action: none;
      background: #fffffff0; border-radius: 18px;
      align-items: center; gap: 12px; padding: 14px 12px;
      display: flex; box-shadow: 0 3px #bfc8dd99;
    }
    .sort-card.correct { border-color: var(--color-green-dark); background: #ecfff0; }
    .sort-card.wrong { background: #fff0f5; border-color: #dd678f; }
    .step-input {
      border: 2px solid var(--color-line); width: 100%;
      font: inherit; color: var(--color-ink);
      background: #fff; border-radius: 14px; outline: none;
      padding: 10px 12px; font-size: 15px; transition: border-color .15s;
    }
    .step-input:focus { border-color: var(--color-blue); }

    /* Vocab flip cards */
    .vocab-card { perspective: 600px; cursor: pointer; height: 120px; }
    .vocab-card-inner {
      width: 100%; height: 100%; transform-style: preserve-3d;
      transition: transform .5s; position: relative;
    }
    .vocab-card-inner.flipped { transform: rotateY(180deg); }
    .vocab-card-face {
      backface-visibility: hidden; border-radius: var(--radius-card);
      flex-direction: column; justify-content: center; align-items: center;
      padding: 16px; display: flex; position: absolute; inset: 0;
    }
    .vocab-card-back { transform: rotateY(180deg); }

    /* Bottom nav */
    .bottom-nav {
      border-top: 4px solid var(--color-blue);
      z-index: 30; background: #fffffff7;
      padding: 10px 16px; position: fixed;
      bottom: 0; left: 0; right: 0;
    }
    .bottom-nav-inner {
      grid-template-columns: repeat(5, 1fr);
      gap: 8px; max-width: 430px; margin: 0 auto; display: grid;
    }
    .nav-btn {
      text-align: center; color: #4c5c74; font-size: 10px;
      font-family: var(--font-fredoka); cursor: pointer;
      background: #fff; border: 2px solid #cad0e0;
      border-radius: 14px; flex-direction: column;
      align-items: center; gap: 2px; padding: 8px 4px;
      display: flex; text-decoration: none;
    }
    .nav-btn.active {
      border-color: var(--color-blue); color: var(--color-blue);
      background: #dff1ff;
    }
    .nav-btn .nav-icon { font-size: 18px; }
    .nav-btn .nav-label { font-size: 10px; font-weight: 600; }

    .home-header {
      z-index: 5; color: #fff;
      border-bottom: 4px solid var(--color-blue-dark);
      backdrop-filter: blur(3px);
      background: linear-gradient(#4aa3dcf5, #3995d5f5);
      padding: 14px 16px; position: sticky; top: 0;
      border-radius: 0 0 var(--radius-card) var(--radius-card);
      margin: -18px -16px 20px;
    }
    .log-entry {
      border-left: 4px solid; border-radius: 12px;
      padding: 10px 12px; font-size: 13px; line-height: 1.4;
    }
    .log-entry.success { border-color: var(--color-green-dark); color: #1a4d2a; background: #ecfff0; }
    .log-entry.precondition_error { color: #7a4f00; background: #fff7e7; border-color: #e0b560; }
    .log-entry.literal_interpretation { color: #7a1f3a; background: #fff0f5; border-color: #dd678f; }

    .locked-overlay {
      background: var(--color-locked); opacity: .6;
      border-radius: var(--radius-card);
      position: absolute; inset: 0; z-index: 2;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="ds-backdrop"></div>
  <div class="ds-screen">
    {% block content %}{% endblock %}
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="{{ url_for('home') }}" class="nav-btn {% if request.path == '/' %}active{% endif %}">
        <span class="nav-icon">&#127968;</span>
        <span class="nav-label">Home</span>
      </a>
      <a href="{{ url_for('simulator') }}" class="nav-btn {% if '/simulator' in request.path %}active{% endif %}">
        <span class="nav-icon">&#129302;</span>
        <span class="nav-label">Simulator</span>
      </a>
      <a href="{{ url_for('exercise', num=1) }}" class="nav-btn {% if '/exercise' in request.path %}active{% endif %}">
        <span class="nav-icon">&#9999;&#65039;</span>
        <span class="nav-label">Exercises</span>
      </a>
      <a href="{{ url_for('challenge') }}" class="nav-btn {% if '/challenge' in request.path %}active{% endif %}">
        <span class="nav-icon">&#127942;</span>
        <span class="nav-label">Challenge</span>
      </a>
      <a href="{{ url_for('review') }}" class="nav-btn {% if '/review' in request.path %}active{% endif %}">
        <span class="nav-icon">&#11088;</span>
        <span class="nav-label">Review</span>
      </a>
    </div>
  </nav>

  {% block scripts %}{% endblock %}
</body>
</html>
