<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}" />
  <title>{% block title %}DreamSpace -- Lesson 1{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Silkscreen:wght@400;700&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fredoka: ['"Fredoka"', 'system-ui', 'sans-serif'],
            silkscreen: ['"Silkscreen"', 'monospace'],
          },
          colors: {
            cream: '#fffaf3',
            'ds-blue': '#4f91d7',
            'ds-blue-dark': '#2f6fae',
            ink: '#274565',
            muted: '#5d7390',
            line: '#b7d2ef',
            'ds-purple': '#9f8de6',
            'ds-green': '#37a951',
            locked: '#d6dce8',
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --color-cream: #fff8ee;
      --color-blue: #2563eb;
      --color-blue-dark: #1d4ed8;
      --color-ink: #0f172a;
      --color-muted: #475569;
      --color-line: #93c5fd;
      --color-purple: #7c3aed;
      --color-green-dark: #15803d;
      --color-locked: #cbd5e1;
      --color-orange: #d97706;
      --color-pink: #db2777;
      --font-body: "Baloo 2", "Fredoka", system-ui, sans-serif;
      --font-heading: "Fredoka", system-ui, sans-serif;
      --font-fredoka: "Fredoka", system-ui, sans-serif;
      --font-silkscreen: "Silkscreen", monospace;
      --font-pixel: "Silkscreen", monospace;
      --radius-card: 24px;
      --radius-pill: 999px;
      --radius-btn: 20px;
      --shadow-card: 0 6px 0 #2563eb25, 0 2px 8px #0002;
      --shadow-btn: 0 5px 0 #1e3a8a;
      --shadow-chip: 0 3px 0 #2563eb25;
    }

    html, body {
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--color-ink);
      margin: 0; font-size: 16px;
    }
    body {
      background: var(--color-cream);
      background-image:
        radial-gradient(circle at 10% 20%, #dbeafe44 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, #ede9fe44 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, #fef3c744 0%, transparent 60%);
    }
    button { font: inherit; cursor: pointer; }
    img { max-width: 100%; display: block; }

    .ds-backdrop {
      pointer-events: none; z-index: -1;
      position: fixed; inset: 0; overflow: hidden;
    }
    .ds-backdrop::before, .ds-backdrop::after {
      content: ''; position: absolute; border-radius: 50%; opacity: .06;
    }
    .ds-backdrop::before {
      width: 400px; height: 400px; background: var(--color-purple);
      top: -100px; right: -100px; animation: float 20s ease-in-out infinite;
    }
    .ds-backdrop::after {
      width: 300px; height: 300px; background: var(--color-orange);
      bottom: -80px; left: -80px; animation: float 15s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
    }
    @keyframes pop-in {
      0% { transform: scale(.85); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .ds-screen {
      width: 100%; max-width: 1280px; min-height: 100vh;
      margin: 0 auto; padding: 24px clamp(16px, 3vw, 48px) 90px;
      position: relative; box-sizing: border-box;
    }
    .ds-card {
      border: 3px solid var(--color-blue);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      color: var(--color-ink); background: #ffffffee; padding: 20px;
      transition: transform .2s, box-shadow .2s;
      animation: pop-in .4s ease-out both;
    }
    .ds-card:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #4a9ff520, 0 4px 12px #0002; }
    .ds-card-line {
      border: 3px solid var(--color-line);
      border-radius: var(--radius-card);
      background: #ffffffee; padding: 20px;
      box-shadow: 0 4px 0 #94a3b820;
      animation: pop-in .4s ease-out both;
    }
    .ds-pixel-chip {
      border: 2px solid var(--color-blue);
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-chip);
      color: var(--color-blue-dark);
      letter-spacing: .1em; font-size: 12px;
      font-family: var(--font-silkscreen);
      background: #fff; padding: 7px 13px;
      display: inline-block; font-weight: 700;
    }
    .ds-btn-primary {
      border-radius: var(--radius-btn); color: #fff; width: 100%;
      box-shadow: var(--shadow-btn); font-size: 18px; font-weight: 700;
      font-family: var(--font-heading); cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border: none; padding: 16px 20px; transition: all .15s;
      text-align: center; text-decoration: none; display: block;
    }
    .ds-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #1e3a8a, 0 4px 16px #2563eb40; }
    .ds-btn-primary:active { transform: translateY(1px); box-shadow: 0 2px 0 #1e3a8a; }
    .ds-btn-primary:disabled { opacity: .5; cursor: not-allowed; box-shadow: 0 3px #277db080; }
    .ds-btn-secondary {
      border: 3px solid var(--color-blue);
      border-radius: var(--radius-btn); color: var(--color-blue-dark);
      font-size: 15px; font-family: var(--font-heading); font-weight: 600;
      cursor: pointer; background: #fff; padding: 12px 20px;
      text-align: center; text-decoration: none; display: inline-block;
      transition: all .15s;
    }
    .ds-btn-secondary:hover { background: #eff6ff; transform: translateY(-1px); }
    .ds-bubble {
      border: 3px solid var(--color-line); color: #2a3441;
      background: #fffffff0; border-radius: 20px;
      padding: 14px 16px; font-size: 18px; line-height: 1.3;
      position: relative; box-shadow: 0 3px #bfc8ddcc;
    }
    .ds-bubble::before {
      content: ""; border-left: 3px solid var(--color-line);
      border-bottom: 3px solid var(--color-line);
      background: #fffffff0; width: 16px; height: 16px;
      position: absolute; top: 18px; left: -9px; transform: rotate(45deg);
    }
    .ds-progress-track {
      border: 2px solid var(--color-blue);
      border-radius: var(--radius-pill);
      background: #e0f2fe; flex: 1; height: 22px; padding: 3px;
      box-shadow: inset 0 2px 4px #0001; overflow: hidden;
    }
    .ds-progress-fill {
      border-radius: var(--radius-pill);
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      height: 100%; transition: width .5s; display: block;
    }
    .ds-mascot-wrap {
      border: 3px solid var(--color-blue);
      background: #f0f9ff; border-radius: 26px;
      place-items: center; min-width: 80px; padding: 8px;
      display: grid; box-shadow: 0 4px 0 #3b82f620;
    }
    .ds-mascot {
      object-fit: contain; width: 70px; height: 70px;
      image-rendering: pixelated; filter: drop-shadow(0 3px 2px #0002);
      animation: wiggle 3s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-3deg); }
      75% { transform: rotate(3deg); }
    }
    .ds-footer-cta {
      backdrop-filter: blur(8px);
      border-top: 2px solid var(--color-blue);
      z-index: 20; background: #fffffff5;
      padding: 14px 16px; position: fixed;
      bottom: 56px; left: 0; right: 0;
    }
    .ds-footer-cta-inner { max-width: 1280px; margin: 0 auto; }
    .ds-topbar { align-items: center; gap: 10px; margin-bottom: 22px; display: flex; }
    .ds-speech-row { align-items: flex-start; gap: 14px; margin-bottom: 24px; display: flex; }
    .ds-success-banner {
      color: #15803d; background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border: 2px solid #86efac; border-radius: 20px;
      margin-top: 12px; padding: 16px 20px; font-weight: 700;
      font-size: 16px; animation: pop-in .4s ease-out both;
    }
    .ds-pill {
      color: #7a8799; background: #fff;
      border: 1px solid #c0c9df; border-radius: 999px;
      margin-bottom: 10px; padding: 5px 9px; font-size: 12px;
      display: inline-block;
    }
    .kitchen-item {
      color: var(--color-muted); flex-direction: column;
      align-items: center; gap: 4px; font-size: 11px; display: flex;
    }
    .kitchen-item .item-emoji { font-size: 36px; line-height: 1; }
    .kitchen-item .item-label { text-align: center; max-width: 60px; font-size: 10px; }
    .sort-card {
      border: 3px solid var(--color-line); cursor: grab;
      user-select: none; touch-action: none;
      background: #fffffff0; border-radius: 18px;
      align-items: center; gap: 12px; padding: 14px 12px;
      display: flex; box-shadow: 0 3px #bfc8dd99;
    }
    .sort-card.correct { border-color: var(--color-green-dark); background: #ecfff0; }
    .sort-card.wrong { background: #fff0f5; border-color: #dd678f; }
    .step-input {
      border: 3px solid var(--color-line); width: 100%;
      font: inherit; color: var(--color-ink);
      background: #fff; border-radius: 16px; outline: none;
      padding: 12px 16px; font-size: 16px; transition: all .2s;
    }
    .step-input:focus { border-color: var(--color-purple); box-shadow: 0 0 0 4px #8b5cf620; }

    /* Vocab flip cards */
    .vocab-card { perspective: 800px; cursor: pointer; height: 140px; }
    .vocab-card-inner {
      width: 100%; height: 100%; transform-style: preserve-3d;
      transition: transform .6s cubic-bezier(.4,0,.2,1); position: relative;
    }
    .vocab-card-inner.flipped { transform: rotateY(180deg); }
    .vocab-card .vocab-card-face {
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: var(--radius-card);
      flex-direction: column; justify-content: center; align-items: center;
      padding: 16px; display: flex; position: absolute; inset: 0;
      overflow: hidden;
      /* Override ds-card animation/transition that breaks 3D flip */
      animation: none !important;
      transition: none !important;
      transform: rotateY(0deg);
    }
    .vocab-card .vocab-card-face.vocab-card-back {
      transform: rotateY(180deg);
    }
    .vocab-card .ds-card:hover {
      transform: none !important;
    }

    /* Bottom nav */
    .bottom-nav {
      border-top: 3px solid var(--color-blue);
      z-index: 30; background: #ffffffdd;
      backdrop-filter: blur(12px);
      padding: 8px clamp(16px, 3vw, 48px); position: fixed;
      bottom: 0; left: 0; right: 0;
    }
    .bottom-nav-inner {
      grid-template-columns: repeat(5, 1fr);
      gap: 10px; max-width: 1280px; margin: 0 auto; display: grid;
    }
    .nav-btn {
      text-align: center; color: #4c5c74; font-size: 12px;
      font-family: var(--font-fredoka); cursor: pointer;
      background: #fff; border: 2px solid #cad0e0;
      border-radius: 14px; flex-direction: row;
      align-items: center; gap: 6px; padding: 10px 16px;
      display: flex; text-decoration: none; justify-content: center;
    }
    @media (max-width: 600px) {
      .nav-btn { flex-direction: column; gap: 2px; padding: 8px 4px; font-size: 10px; }
    }
    .nav-btn:hover { background: #eff6ff; border-color: var(--color-blue); transform: translateY(-2px); }
    .nav-btn.active {
      border-color: var(--color-purple); color: #5b21b6;
      background: linear-gradient(135deg, #ede9fe, #dbeafe);
      box-shadow: 0 3px 0 #7c3aed30;
    }
    .nav-btn .nav-icon { font-size: 28px; }
    .nav-btn .nav-label { font-size: 14px; font-weight: 700; }

    .home-header {
      z-index: 5; color: #fff;
      border-bottom: 4px solid #1d4ed8;
      backdrop-filter: blur(4px);
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      padding: 20px clamp(16px, 3vw, 48px); position: sticky; top: 0;
      border-radius: 0 0 var(--radius-card) var(--radius-card);
      margin: -24px calc(-1 * clamp(16px, 3vw, 48px)) 24px;
    }
    .log-entry {
      border-left: 4px solid; border-radius: 12px;
      padding: 10px 12px; font-size: 13px; line-height: 1.4;
    }
    .log-entry.success { border-color: var(--color-green-dark); color: #1a4d2a; background: #ecfff0; }
    .log-entry.precondition_error { color: #7a4f00; background: #fff7e7; border-color: #e0b560; }
    .log-entry.literal_interpretation { color: #7a1f3a; background: #fff0f5; border-color: #dd678f; }

    .locked-overlay {
      background: var(--color-locked); opacity: .6;
      border-radius: var(--radius-card);
      position: absolute; inset: 0; z-index: 2;
    }

    /* Fun extras */
    h1, h2, h3 { font-family: var(--font-heading); }
    ::selection { background: #c4b5fd; color: #1e1b4b; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="ds-backdrop"></div>
  <div class="ds-screen">
    {% block content %}{% endblock %}
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="{{ url_for('home') }}" class="nav-btn {% if request.path == '/' %}active{% endif %}">
        <span class="nav-icon">&#127968;</span>
        <span class="nav-label">Home</span>
      </a>
      <a href="{{ url_for('lesson_home', lesson_num=1) }}" class="nav-btn nav-lesson1 {% if '/lesson/1' in request.path %}active{% endif %}">
        <span class="nav-icon">&#129302;</span>
        <span class="nav-label">Lesson 1</span>
      </a>
      <a href="{{ url_for('lesson_home', lesson_num=2) }}" class="nav-btn nav-lesson2 {% if '/lesson/2' in request.path %}active{% endif %}">
        <span class="nav-icon">&#128260;</span>
        <span class="nav-label">Lesson 2</span>
      </a>
      <a href="{{ url_for('lesson_home', lesson_num=3) }}" class="nav-btn nav-lesson3 {% if '/lesson/3' in request.path %}active{% endif %}">
        <span class="nav-icon">&#128268;</span>
        <span class="nav-label">Lesson 3</span>
      </a>
      <a href="{{ url_for('review') }}" class="nav-btn {% if '/review' in request.path %}active{% endif %}">
        <span class="nav-icon">&#11088;</span>
        <span class="nav-label">Review</span>
      </a>
    </div>
  </nav>

  {% block scripts %}{% endblock %}
</body>
</html>
