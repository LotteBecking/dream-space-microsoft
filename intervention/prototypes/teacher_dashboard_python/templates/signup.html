<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – DreamSpace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-text {
            background: linear-gradient(to right, #9333ea, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #9333ea 0%, #ec4899 100%);
        }
        .card-shadow {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        }
        .role-btn.active {
            background: linear-gradient(135deg, #9333ea 0%, #ec4899 100%);
            color: white;
            border-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-8">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 gradient-bg rounded-xl text-white text-2xl font-bold mb-4">
                DS
            </div>
            <h1 class="text-3xl font-bold text-gray-900">Create an account</h1>
            <p class="text-gray-500 mt-2">Join DreamSpace to start learning or teaching</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-xl p-8 card-shadow">
            <!-- Error banner -->
            <div id="error-banner" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm flex items-center">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="error-message"></span>
            </div>

            <!-- Success banner -->
            <div id="success-banner" class="hidden mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm flex items-center">
                <i class="fas fa-check-circle mr-2"></i>
                <span id="success-message"></span>
            </div>

            <form id="signup-form" class="space-y-5">
                <!-- Role selector -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">I am a…</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="role-student"
                                class="role-btn active flex items-center justify-center gap-2 px-4 py-2.5 border-2 border-gray-200 rounded-lg font-medium transition"
                                onclick="setRole('student')">
                            <i class="fas fa-user-graduate"></i> Student
                        </button>
                        <button type="button" id="role-teacher"
                                class="role-btn flex items-center justify-center gap-2 px-4 py-2.5 border-2 border-gray-200 rounded-lg font-medium text-gray-600 hover:border-purple-300 transition"
                                onclick="setRole('teacher')">
                            <i class="fas fa-chalkboard-teacher"></i> Teacher
                        </button>
                    </div>
                    <input type="hidden" id="role" value="student">
                </div>

                <!-- Name -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Full name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="name" name="name" required autocomplete="name"
                               class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                               placeholder="Your full name">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="email" name="email" required autocomplete="email"
                               class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                               placeholder="you@example.com">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6"
                               class="w-full pl-10 pr-10 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                               placeholder="At least 6 characters">
                        <button type="button" onclick="togglePassword('password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <p id="pw-hint" class="text-xs text-gray-400 mt-1">Must be at least 6 characters</p>
                </div>

                <!-- Confirm password -->
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-2">Confirm password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="confirm-password" name="confirm-password" required autocomplete="new-password"
                               class="w-full pl-10 pr-10 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                               placeholder="Re-enter your password">
                        <button type="button" onclick="togglePassword('confirm-password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Class code (student only) -->
                <div id="class-code-field">
                    <label for="class-code" class="block text-sm font-medium text-gray-700 mb-2">
                        Class code <span class="text-gray-400 font-normal">(optional)</span>
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-hashtag"></i>
                        </span>
                        <input type="text" id="class-code" name="class-code" autocomplete="off" maxlength="8"
                               class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition uppercase tracking-widest"
                               placeholder="e.g. ABCD1234">
                    </div>
                    <p class="text-xs text-gray-400 mt-1">Got a code from your teacher? Enter it to join their class</p>
                </div>

                <!-- Submit -->
                <button type="submit" id="signup-btn"
                        class="w-full gradient-bg text-white font-semibold py-2.5 rounded-lg hover:opacity-90 transition flex items-center justify-center">
                    <span id="signup-text">Create account</span>
                    <i id="signup-spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center my-6">
                <div class="flex-1 border-t border-gray-200"></div>
                <span class="px-4 text-sm text-gray-400">or</span>
                <div class="flex-1 border-t border-gray-200"></div>
            </div>

            <p class="text-center text-sm text-gray-600">
                Already have an account?
                <a href="/login" class="font-semibold text-purple-600 hover:text-purple-700 transition">Sign in</a>
            </p>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 mt-6">
            &copy; 2024 DreamSpace. Empowering teachers and inspiring young minds.
        </p>
    </div>

    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function setRole(role) {
            document.getElementById('role').value = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.add('text-gray-600');
            });
            const active = document.getElementById('role-' + role);
            active.classList.add('active');
            active.classList.remove('text-gray-600');

            // Show/hide class code field
            document.getElementById('class-code-field').style.display = role === 'student' ? 'block' : 'none';
        }

        function showError(msg) {
            document.getElementById('success-banner').classList.add('hidden');
            const banner = document.getElementById('error-banner');
            document.getElementById('error-message').textContent = msg;
            banner.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-banner').classList.add('hidden');
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPw = document.getElementById('confirm-password').value;
            const role = document.getElementById('role').value;
            const classCode = document.getElementById('class-code').value.trim().toUpperCase();

            if (!name || !email || !password) {
                showError('Please fill in all required fields.');
                return;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }
            if (password !== confirmPw) {
                showError('Passwords do not match.');
                return;
            }

            const btn = document.getElementById('signup-btn');
            const text = document.getElementById('signup-text');
            const spinner = document.getElementById('signup-spinner');
            btn.disabled = true;
            text.textContent = 'Creating account…';
            spinner.classList.remove('hidden');

            try {
                // 1. Create account
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name, role }),
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Signup failed.');
                    return;
                }

                // Store session
                localStorage.setItem('ds_token', data.token);
                localStorage.setItem('ds_role', data.role);
                localStorage.setItem('ds_name', data.name);
                if (data.studentId) localStorage.setItem('ds_student_id', data.studentId);
                if (data.teacherId) localStorage.setItem('ds_teacher_id', data.teacherId);

                // 2. If student provided a class code, join that class
                if (role === 'student' && classCode) {
                    try {
                        await fetch('/api/auth/join-class', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + data.token,
                            },
                            body: JSON.stringify({ code: classCode }),
                        });
                    } catch (_) {
                        // Non-fatal: account created, class join can be retried
                    }
                }

                // Redirect
                window.location.href = '/';

            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                btn.disabled = false;
                text.textContent = 'Create account';
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
