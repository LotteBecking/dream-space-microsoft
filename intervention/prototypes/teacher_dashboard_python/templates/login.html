<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
        }

        /* Animated Background */
        .animated-bg {
            background: linear-gradient(-45deg, #1a1a2e, #2d2d44, #16213e, #0f3460);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Elements */
        .floating-element {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .floating-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            top: -50px;
            left: -50px;
            animation-delay: 0s;
        }

        .floating-2 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            bottom: -30px;
            right: -30px;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(40px); }
        }

        /* Modal Container */
        .modal-overlay {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        /* Input Styling */
        .input-field {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(102, 126, 234, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: scale(1.02);
        }

        .input-field::placeholder {
            color: rgba(107, 114, 128, 0.6);
        }

        .input-icon {
            transition: all 0.3s ease;
        }

        .input-field:focus ~ .input-icon {
            color: #667eea;
            transform: scale(1.2);
        }

        /* Button Styling */
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        /* Labels */
        .form-label {
            color: #1f2937;
            font-weight: 600;
            font-size: 0.875rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 0.75rem 0;
            color: #9ca3af;
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, #d1d5db, transparent);
        }

        /* Link */
        .auth-link {
            background: linear-gradient(to right, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .auth-link:hover {
            filter: brightness(1.2);
        }

        /* Form container animations */
        .form-field {
            animation: slideUp 0.6s ease-out;
            animation-fill-mode: both;
        }

        .form-field:nth-child(1) { animation-delay: 0.1s; }
        .form-field:nth-child(2) { animation-delay: 0.2s; }

        /* Checkbox styling */
        .remember-checkbox {
            transition: all 0.3s ease;
        }

        .remember-checkbox:checked {
            background-color: #667eea;
            border-color: #667eea;
        }

        /* Error message */
        .error-message {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(220, 38, 38, 0.1));
            border: 1px solid rgba(239, 68, 68, 0.3);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Logo animation */
        .logo-icon {
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Subtle gradient text */
        .gradient-title {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="animated-bg min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Floating Background Elements -->
    <div class="floating-element floating-1"></div>
    <div class="floating-element floating-2"></div>

    <!-- Modal Overlay -->
    <div class="modal-overlay fixed inset-0 bg-black/40 backdrop-blur-md z-40"></div>

    <!-- Login Modal -->
    <div class="fixed inset-0 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="modal-content w-full max-w-md my-8">
            <!-- Card with Glassmorphism -->
            <div class="glass-card rounded-3xl p-6 md:p-8 relative">
                <!-- Animated Background Gradient -->
                <div class="absolute inset-0 rounded-3xl bg-gradient-to-br from-white/20 to-white/10 pointer-events-none"></div>

                <!-- Content -->
                <div class="relative z-10">
                    <!-- Logo & Title -->
                    <div class="text-center mb-6">
                        <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl mb-4 shadow-lg logo-icon">
                            <i class="fas fa-graduation-cap text-white text-3xl"></i>
                        </div>
                        <h1 class="text-3xl font-bold gradient-title mb-2">Welcome Back</h1>
                        <p class="text-gray-600 text-base">Continue your teaching journey</p>
                    </div>

                    <!-- Login Form -->
                    <form method="POST" action="/login" class="space-y-4">
                        <!-- Username Field -->
                        <div class="form-field">
                            <label for="username" class="form-label mb-3 block">Username</label>
                            <div class="relative group">
                                <i class="fas fa-user input-icon absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
                                <input 
                                    type="text" 
                                    id="username" 
                                    name="username" 
                                    required 
                                    class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-gray-800 text-base"
                                    placeholder="Enter your username"
                                >
                            </div>
                        </div>

                        <!-- Password Field -->
                        <div class="form-field">
                            <label for="password" class="form-label mb-3 block">Password</label>
                            <div class="relative group">
                                <i class="fas fa-lock input-icon absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
                                <input 
                                    type="password" 
                                    id="password" 
                                    name="password" 
                                    required 
                                    class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-gray-800 text-base"
                                    placeholder="••••••••"
                                >
                            </div>
                        </div>

                        <!-- Remember Me -->
                        <div class="flex items-center gap-2 text-gray-700">
                            <input 
                                type="checkbox" 
                                id="remember" 
                                name="remember" 
                                class="remember-checkbox w-5 h-5 accent-purple-600 rounded cursor-pointer"
                            >
                            <label for="remember" class="text-sm font-medium cursor-pointer select-none">
                                Remember for 30 days
                            </label>
                        </div>

                        <!-- Error Message -->
                        {% if error %}
                        <div class="error-message rounded-xl p-4 flex items-start gap-3 text-red-700">
                            <i class="fas fa-exclamation-circle mt-1 flex-shrink-0"></i>
                            <span class="text-sm font-medium">{{ error }}</span>
                        </div>
                        {% endif %}

                        <!-- Submit Button -->
                        <button 
                            type="submit" 
                            class="btn-primary w-full text-white font-bold py-3 px-6 rounded-xl text-lg flex items-center justify-center gap-2 shadow-lg"
                        >
                            <i class="fas fa-sign-in-alt"></i>
                            <span>Sign In</span>
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="divider my-3">or</div>

                    <!-- Registration Link -->
                    <p class="text-center text-gray-700 text-sm">
                        Don't have an account? 
                        <a href="/register" class="auth-link ml-1">Create one</a>
                    </p>

                    <!-- Footer -->
                    <div class="mt-4 text-center text-xs text-gray-500 space-y-1">
                        <p class="opacity-70">
                            <a href="#" class="auth-link text-xs hover:opacity-70">Forgot password?</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
