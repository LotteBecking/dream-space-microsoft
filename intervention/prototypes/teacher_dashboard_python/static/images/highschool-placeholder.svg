<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">High School Lesson Placeholder</title>
  <desc id="desc">Visual placeholder for upcoming high school lessons.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="170" cy="140" r="76" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="1110" cy="585" r="132" fill="#ffffff" fill-opacity="0.08"/>

  <rect x="120" y="100" width="1040" height="520" rx="28" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.2"/>

  <text x="180" y="210" fill="#ffffff" fill-opacity="0.9" font-size="28" font-family="Arial, sans-serif" letter-spacing="1">DREAM SPACE</text>
  <text x="180" y="300" fill="#ffffff" font-size="54" font-weight="700" font-family="Arial, sans-serif">High School Track</text>
  <text x="180" y="370" fill="#ffffff" font-size="44" font-weight="700" font-family="Arial, sans-serif">Lessons 9-16 Placeholder</text>

  <text x="180" y="460" fill="#ffffff" fill-opacity="0.86" font-size="30" font-family="Arial, sans-serif">Ages 12-17 - Draft content to be added</text>
  <text x="180" y="505" fill="#ffffff" fill-opacity="0.78" font-size="24" font-family="Arial, sans-serif">Structure ready for objectives, exercises, and challenges.</text>

  <rect x="180" y="538" width="390" height="56" rx="28" fill="#ffffff" fill-opacity="0.16"/>
  <text x="220" y="573" fill="#ffffff" font-size="24" font-family="Arial, sans-serif">Teacher Dashboard Slide</text>
</svg>
