<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="l1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="l1dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4954a"/>
      <stop offset="100%" stop-color="#c07c35"/>
    </linearGradient>
    <linearGradient id="l1bread" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e4b8"/>
      <stop offset="100%" stop-color="#edcf8a"/>
    </linearGradient>
    <linearGradient id="l1pb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c87d2e"/>
      <stop offset="100%" stop-color="#a05e18"/>
    </linearGradient>
    <linearGradient id="l1jam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9d2553"/>
      <stop offset="100%" stop-color="#7b1a40"/>
    </linearGradient>
    <linearGradient id="l1crust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc8840"/>
      <stop offset="100%" stop-color="#a86a28"/>
    </linearGradient>
    <filter id="l1shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" fill="url(#l1bg)"/>

  <!-- Subtle dot grid (algorithm/sequence motif) -->
  <g fill="#d97706" fill-opacity="0.18">
    <circle cx="60"  cy="44"  r="3.5"/>
    <circle cx="110" cy="78"  r="3.5"/>
    <circle cx="68"  cy="130" r="3.5"/>
    <circle cx="118" cy="164" r="3.5"/>
    <circle cx="38"  cy="170" r="2.5"/>
    <circle cx="148" cy="48"  r="2.5"/>
  </g>
  <g stroke="#d97706" stroke-opacity="0.15" stroke-width="1.5" fill="none">
    <line x1="60"  y1="47"  x2="110" y2="74"/>
    <line x1="110" y1="82"  x2="68"  y2="126"/>
    <line x1="68"  y1="133" x2="118" y2="160"/>
  </g>

  <g fill="#7c3aed" fill-opacity="0.15">
    <circle cx="688" cy="44"  r="3.5"/>
    <circle cx="740" cy="76"  r="3.5"/>
    <circle cx="700" cy="132" r="3.5"/>
    <circle cx="752" cy="164" r="3.5"/>
    <circle cx="664" cy="166" r="2.5"/>
    <circle cx="762" cy="50"  r="2.5"/>
  </g>
  <g stroke="#7c3aed" stroke-opacity="0.12" stroke-width="1.5" fill="none">
    <line x1="688" y1="47"  x2="740" y2="73"/>
    <line x1="740" y1="80"  x2="700" y2="128"/>
    <line x1="700" y1="135" x2="752" y2="160"/>
  </g>

  <!-- ══ SANDWICH ══ (centered x=400, filter for drop shadow) -->
  <g filter="url(#l1shadow)">

    <!-- Bottom crust -->
    <rect x="230" y="158" width="340" height="20" rx="10" fill="url(#l1crust)"/>

    <!-- Bottom bread body -->
    <rect x="230" y="134" width="340" height="30" fill="url(#l1bread)"/>
    <!-- bread highlight top edge -->
    <rect x="230" y="134" width="340" height="4" rx="2" fill="#fffde8" fill-opacity="0.5"/>

    <!-- Jam layer -->
    <rect x="230" y="116" width="340" height="20" fill="url(#l1jam)"/>
    <!-- jam shine -->
    <rect x="230" y="116" width="340" height="5" fill="#c4366a" fill-opacity="0.4"/>
    <!-- jam drips -->
    <ellipse cx="255" cy="128" rx="9" ry="11" fill="#8a1f48"/>
    <ellipse cx="564" cy="125" rx="7" ry="9"  fill="#8a1f48"/>
    <ellipse cx="310" cy="136" rx="5" ry="4"  fill="#8a1f48" fill-opacity="0.6"/>

    <!-- Peanut butter layer -->
    <rect x="230" y="96" width="340" height="22" fill="url(#l1pb)"/>
    <!-- PB shine -->
    <rect x="230" y="96" width="340" height="5" fill="#e09840" fill-opacity="0.4"/>
    <!-- PB texture bumps -->
    <circle cx="290" cy="107" r="3.5" fill="#b06520" fill-opacity="0.45"/>
    <circle cx="350" cy="104" r="3"   fill="#b06520" fill-opacity="0.45"/>
    <circle cx="400" cy="108" r="3.5" fill="#b06520" fill-opacity="0.45"/>
    <circle cx="455" cy="104" r="3"   fill="#b06520" fill-opacity="0.45"/>
    <circle cx="510" cy="107" r="3.5" fill="#b06520" fill-opacity="0.45"/>

    <!-- Top bread body -->
    <rect x="230" y="72" width="340" height="28" fill="url(#l1bread)"/>
    <!-- underside shadow of dome meeting body -->
    <rect x="230" y="94" width="340" height="5" fill="#c4a050" fill-opacity="0.3"/>

    <!-- Top bread dome (crust) -->
    <path d="M230,82 C230,38 400,22 570,38 L570,82 Z" fill="url(#l1dome)"/>
    <!-- dome highlight -->
    <path d="M270,72 C290,42 400,30 510,48 L510,58 C400,42 300,50 270,72 Z" fill="#e8a850" fill-opacity="0.35"/>

    <!-- Sesame seeds -->
    <g fill="#f5deb3" fill-opacity="0.85">
      <ellipse cx="308" cy="56" rx="6.5" ry="2.5" transform="rotate(-18 308 56)"/>
      <ellipse cx="360" cy="43" rx="6"   ry="2.5" transform="rotate(8  360 43)"/>
      <ellipse cx="400" cy="38" rx="6"   ry="2.5" transform="rotate(-5 400 38)"/>
      <ellipse cx="445" cy="41" rx="6"   ry="2.5" transform="rotate(12 445 41)"/>
      <ellipse cx="495" cy="52" rx="6"   ry="2.5" transform="rotate(-10 495 52)"/>
    </g>

  </g>

  <!-- Layer callout lines (subtle, right side) -->
  <g font-family="Arial, sans-serif" font-size="12" fill-opacity="0.55">
    <line x1="573" y1="107" x2="596" y2="107" stroke="#c87d2e" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="599" y="111" fill="#a05e18">peanut butter</text>

    <line x1="573" y1="126" x2="596" y2="126" stroke="#9d2553" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="599" y="130" fill="#7b1a40">jam</text>
  </g>

  <!-- Lesson tag bottom-left -->
  <rect x="22" y="182" width="130" height="24" rx="12" fill="#7c3aed" fill-opacity="0.12"/>
  <text x="36" y="198" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#7c3aed" fill-opacity="0.75" letter-spacing="0.5">LESSON 1 · UNPLUGGED</text>
</svg>
